name: "FAST Stage 0 — Bootstrap"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - import-and-apply
        default: plan

env:
  TF_VERSION: "1.12.2"
  WORKING_DIR: "fast/stages/0-org-setup"
  ORG_ID: "1041701195417"

jobs:
  stage-0:
    name: "Stage 0 — ${{ inputs.action }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_BOOTSTRAP_SA_KEY }}

      - name: Create bootstrap provider config
        run: |
          cat > provider-bootstrap.tf <<'EOF'
          provider "google" {}
          provider "google-beta" {}
          EOF

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Download previous state
        uses: dawidd6/action-download-artifact@v6
        with:
          name: fast-stage-0-tfstate
          path: ${{ env.WORKING_DIR }}
          search_artifacts: true
          if_no_artifact_found: warn
          workflow_conclusion: ''

      - name: Terraform Init
        run: terraform init

      - name: Pre-create custom constraints
        if: inputs.action == 'apply' || inputs.action == 'import-and-apply'
        run: |
          echo "Pre-creating all custom org policy constraints..."
          CONSTRAINTS_DIR="datasets/hardened/organization/custom-constraints"
          ORG="organizations/$ORG_ID"
          IAC_PROJECT="fast-poc-prod-iac-core-0"

          for f in "$CONSTRAINTS_DIR"/*.yaml; do
            # Extract constraint name from filename
            CONSTRAINT_NAME=$(basename "$f" .yaml)

            # Read the YAML, substitute template variables, convert to gcloud format
            CONDITION=$(python3 -c "
          import yaml, sys
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          key = list(data.keys())[0]
          c = data[key]
          # Template substitutions
          condition = c['condition']
          condition = condition.replace('\${project_ids.iac-0}', '$IAC_PROJECT')
          condition = condition.replace('\${iam_principals.gcp-organization-admins}', 'group:gcp-organization-admins@gigachadglobal.org')
          condition = condition.replace('\${organization.domain}', 'gigachadglobal.org')
          print(condition)
          ")

            DISPLAY_NAME=$(python3 -c "
          import yaml
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          key = list(data.keys())[0]
          print(data[key].get('display_name', key))
          ")

            DESCRIPTION=$(python3 -c "
          import yaml
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          key = list(data.keys())[0]
          print(data[key].get('description', ''))
          ")

            ACTION_TYPE=$(python3 -c "
          import yaml
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          key = list(data.keys())[0]
          print(data[key]['action_type'])
          ")

            METHOD_TYPES=$(python3 -c "
          import yaml
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          key = list(data.keys())[0]
          print(','.join(data[key]['method_types']))
          ")

            RESOURCE_TYPES=$(python3 -c "
          import yaml
          with open('$f') as fh:
              data = yaml.safe_load(fh)
          key = list(data.keys())[0]
          print(','.join(data[key]['resource_types']))
          ")

            # Write constraint YAML for gcloud
            cat > /tmp/constraint.yaml <<CEOF
          name: $ORG/customConstraints/$CONSTRAINT_NAME
          resourceTypes:
          $(echo "$RESOURCE_TYPES" | tr ',' '\n' | sed 's/^/  - /')
          methodTypes:
          $(echo "$METHOD_TYPES" | tr ',' '\n' | sed 's/^/  - /')
          condition: |-
          $(echo "$CONDITION" | sed 's/^/  /')
          actionType: $ACTION_TYPE
          displayName: "$DISPLAY_NAME"
          description: "$DESCRIPTION"
          CEOF

            gcloud org-policies set-custom-constraint /tmp/constraint.yaml 2>/dev/null \
              && echo "  Created: $CONSTRAINT_NAME" \
              || echo "  Failed or exists: $CONSTRAINT_NAME"
          done
          echo "Custom constraint pre-creation complete."

      - name: Import orphaned resources
        if: inputs.action == 'import-and-apply'
        run: |
          set +e
          echo "Importing orphaned custom roles..."
          for role in cloudKmsViewer:cloudkms_viewer folderViewer:folder_viewer loggingViewer:logging_viewer networkFirewallPoliciesAdmin:network_firewall_policies_admin ngfwEnterpriseAdmin:ngfw_enterprise_admin ngfwEnterpriseViewer:ngfw_enterprise_viewer organizationAdminViewer:organization_admin_viewer organizationIamAdmin:organization_iam_admin projectIamViewer:project_iam_viewer serviceAccountViewer:service_account_viewer serviceNetworkingViewer:service_networking_viewer serviceProjectNetworkAdmin:service_project_network_admin storageViewer:storage_viewer tagViewer:tag_viewer; do
            GCP_ID="${role%%:*}"
            TF_KEY="${role##*:}"
            echo "  Importing $TF_KEY..."
            terraform import \
              "module.organization[0].google_organization_iam_custom_role.roles[\"$TF_KEY\"]" \
              "organizations/$ORG_ID/roles/$GCP_ID" 2>/dev/null || echo "  (skipped or already in state)"
          done

          echo "Importing orphaned tag keys..."
          for key_short in context environment org-policies; do
            KEY_ID=$(gcloud resource-manager tags keys list \
              --parent="organizations/$ORG_ID" \
              --filter="shortName=$key_short" \
              --format="value(name)" 2>/dev/null)
            if [ -n "$KEY_ID" ]; then
              echo "  Importing tag key $key_short ($KEY_ID)..."
              terraform import \
                "module.organization[0].google_tags_tag_key.default[\"$key_short\"]" \
                "$KEY_ID" 2>/dev/null || echo "  (skipped or already in state)"

              echo "  Importing tag values for $key_short..."
              for val_line in $(gcloud resource-manager tags values list \
                --parent="$KEY_ID" \
                --format="csv[no-heading](name,shortName)" 2>/dev/null); do
                VAL_ID="${val_line%%,*}"
                VAL_SHORT="${val_line##*,}"
                echo "    Importing tag value $key_short/$VAL_SHORT ($VAL_ID)..."
                terraform import \
                  "module.organization[0].google_tags_tag_value.default[\"$key_short/$VAL_SHORT\"]" \
                  "$VAL_ID" 2>/dev/null || echo "    (skipped or already in state)"
              done
            fi
          done

          echo "Importing orphaned folders..."
          # Hardcode known folder mappings to avoid CSV parsing issues with spaces in names
          declare -A FOLDER_MAP
          FOLDER_MAP["Networking"]="networking"
          FOLDER_MAP["Security"]="security"
          FOLDER_MAP["Teams"]="teams"
          FOLDER_MAP["Data Platform"]="data-platform"

          while IFS=$'\t' read -r FOLDER_ID FOLDER_NAME; do
            FOLDER_KEY="${FOLDER_MAP[$FOLDER_NAME]:-}"
            if [ -n "$FOLDER_KEY" ] && [ -n "$FOLDER_ID" ]; then
              echo "  Importing folder $FOLDER_NAME ($FOLDER_ID)..."
              terraform import \
                "module.factory.module.folder-1[\"$FOLDER_KEY\"].google_folder.folder[0]" \
                "$FOLDER_ID" 2>/dev/null || echo "  (skipped or already in state)"
            fi
          done < <(gcloud resource-manager folders list \
            --organization="$ORG_ID" \
            --filter="lifecycleState=ACTIVE" \
            --format="value(name,displayName)" 2>/dev/null)

          echo "Importing org logging settings..."
          terraform import \
            "module.organization[0].google_logging_organization_settings.default[0]" \
            "organizations/$ORG_ID/settings" 2>/dev/null || echo "  (skipped or already in state)"

          echo "Importing custom constraints..."
          CONSTRAINTS_DIR="datasets/hardened/organization/custom-constraints"
          for f in "$CONSTRAINTS_DIR"/*.yaml; do
            CONSTRAINT_NAME=$(basename "$f" .yaml)
            echo "  Importing $CONSTRAINT_NAME..."
            terraform import \
              "module.organization-iam[0].google_org_policy_custom_constraint.constraint[\"$CONSTRAINT_NAME\"]" \
              "organizations/$ORG_ID/customConstraints/$CONSTRAINT_NAME" 2>/dev/null || echo "  (skipped or already in state)"
          done

          echo "Importing essential contacts..."
          terraform import \
            "module.organization[0].google_essential_contacts_contact.contact[\"\$email_addresses:gcp-organization-admins\"]" \
            "organizations/$ORG_ID/contacts/0" 2>/dev/null || echo "  (skipped or already in state)"

          echo "Import complete."
          set -e

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan-output.txt
          echo '## Terraform Plan' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: inputs.action == 'apply' || inputs.action == 'import-and-apply'
        run: terraform apply tfplan

      - name: Save Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-stage-0-tfstate
          path: ${{ env.WORKING_DIR }}/terraform.tfstate
          if-no-files-found: warn
          retention-days: 90
          overwrite: true

      - name: Upload output files
        if: inputs.action == 'apply' || inputs.action == 'import-and-apply'
        uses: actions/upload-artifact@v4
        with:
          name: fast-stage-0-outputs
          path: ~/fast-config/fast/
          if-no-files-found: warn
          retention-days: 7
